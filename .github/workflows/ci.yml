name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Format, Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy

      # The format/lint/type jobs are advisory until a dedicated cleanup PR
      # brings the existing tree into compliance. Drop `continue-on-error`
      # one-by-one as each tool reaches zero findings.
      - name: black --check (advisory)
        run: black --check src tests
        continue-on-error: true

      - name: flake8 (advisory)
        run: flake8 src tests
        continue-on-error: true

      - name: mypy (advisory)
        run: mypy src
        continue-on-error: true

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,metrics,greeks,api]"

      - name: pytest
        run: pytest --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
