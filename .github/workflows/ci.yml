name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Format, Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy

      # The lint/type jobs are advisory until a dedicated cleanup PR
      # brings the existing tree into compliance. Drop `continue-on-error`
      # one-by-one as each tool reaches zero findings.
      - name: black --check
        run: black --check src tests

      - name: flake8 (advisory)
        run: flake8 src tests
        continue-on-error: true

      - name: mypy (advisory)
        run: mypy src
        continue-on-error: true

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,metrics,greeks,api]"

      - name: pytest
        run: pytest --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  parity:
    # Flow-series parity: spin up Postgres 17 (matches prod), apply
    # schema.sql, seed flow_by_contract via the INCREMENTAL upsert
    # form, then run the parity test that re-derives the same window
    # via the CANONICAL CTE.  Catches drift between the two
    # formulations that the structural-only tests at
    # tests/test_flow_series_incremental_upsert.py can't see.
    #
    # Promoted from advisory to blocking after several consecutive
    # green runs on claude/** branches verified the fixture is
    # stable.  Failing this job now fails CI -- restore
    # continue-on-error only if a drift in the canonical CTE makes
    # the fixture unrunnable while a fix is in flight.
    name: Flow-series parity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: zerogex_test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: zerogex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zerogex_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI_PARITY_DSN: postgresql://zerogex_test:test@localhost:5432/zerogex_test
      PGPASSWORD: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,metrics,greeks,api]"

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 20); do
            pg_isready -h localhost -p 5432 -U zerogex_test && break
            echo "Waiting for postgres... ($i/20)"
            sleep 2
          done

      - name: Run end-to-end parity (schema + seed + test)
        run: PY=python make ci-parity
